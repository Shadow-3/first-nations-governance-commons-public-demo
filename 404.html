  <title>Page Not Found - First Nations Governance Commons</title>
  <style>
    :root {
      --bg: #f6f7f5;
      --surface: #ffffff;
      --text: #1d2523;
      --muted: #61706b;
      --line: #d9e0dc;
      --teal: #0d675f;
      --radius: 6px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    main {
      width: min(620px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 26px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      margin: 10px 0 20px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    a {
      min-height: 38px;
      border-radius: var(--radius);
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      background: var(--teal);
      color: #fff;
      display: inline-flex;
      align-items: center;
    }

    a.secondary {
      background: #ffffff;
      color: var(--teal);
      border: 1px solid var(--teal);
    }
  </style>
</head>
