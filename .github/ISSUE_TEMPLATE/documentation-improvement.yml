name: Documentation improvement
description: Improve public docs, review materials, or implementation guidance.
title: "[Docs] "
labels: ["documentation"]
body:
  - type: textarea
    id: improvement
    attributes:
      label: Improvement
      description: What document or section should change?
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Boundary
      options:
        - label: This does not add private, cultural, real community, or sensitive material.
          required: true

